<style>
:root{--ink:#1a1a1a;--ink-soft:#4a4a48;--ink-mute:#8a8a86;--ink-faint:#b8b8b3;--paper:#faf8f4;--paper-warm:#f3efe7;--paper-cream:#f9f7f2;--rule:rgba(26,26,26,0.08);--rule-strong:rgba(26,26,26,0.18);--field-bg:#fff;--green:#2d6a4f;--green-soft:#e8efe9;--amber:#ba7517;--amber-soft:#f9f1e3;--red:#c44d4d;--red-soft:#f4e8e8;--serif:'Fraunces',Georgia,serif;--sans:'Inter Tight',-apple-system,sans-serif;--mono:'JetBrains Mono','SF Mono',Menlo,monospace}
*{box-sizing:border-box;margin:0;padding:0}html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);line-height:1.55;font-size:14px;font-weight:400}
.h1{font-family:var(--serif);font-weight:300;font-size:clamp(32px,4.5vw,48px);line-height:1.1;letter-spacing:-0.02em;color:var(--ink)}
.h1 em{font-style:italic;font-weight:300}
.h2{font-family:var(--serif);font-weight:400;font-size:22px;line-height:1.2;letter-spacing:-0.01em;color:var(--ink)}
.h3{font-family:var(--serif);font-weight:400;font-size:18px;line-height:1.25;letter-spacing:-0.005em;color:var(--ink)}
.lede{font-family:var(--serif);font-weight:300;font-size:16px;line-height:1.5;letter-spacing:-0.005em;color:var(--ink-soft)}
.eyebrow{font-family:var(--sans);font-size:11px;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-mute)}
.section-label{font-family:var(--sans);font-size:12px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink)}
.caption{font-size:12px;line-height:1.5;color:var(--ink-mute)}
.id{font-family:var(--mono);font-size:13px;font-weight:500;letter-spacing:0.04em;color:var(--ink)}
.shell{display:flex;min-height:100vh}
.sidebar{width:240px;background:#fff;border-right:0.5px solid var(--rule);padding:28px 0;flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.sidebar-wordmark-block{padding:0 24px 24px;border-bottom:0.5px solid rgba(26,26,26,0.06)}
.wordmark{font-family:var(--serif);font-size:22px;font-weight:400;letter-spacing:-0.01em;line-height:1;color:var(--ink);text-decoration:none;display:block}
.wordmark em{font-style:italic;font-weight:300}
.wordmark-tag{font-family:var(--sans);font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-mute);font-weight:500;margin-top:6px}
.sidebar-id-block{padding:18px 24px;border-bottom:0.5px solid rgba(26,26,26,0.06)}
.sidebar-id-label{font-family:var(--sans);font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-mute);font-weight:500;margin-bottom:6px}
.sidebar-nav{padding:20px 12px;flex:1}
.sidebar-nav-label{font-family:var(--sans);font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-faint);font-weight:500;padding:0 12px 12px}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:6px;text-decoration:none;color:var(--ink-soft);font-size:14px;font-weight:400;margin-bottom:2px;transition:background 120ms ease}
.nav-item:hover{background:rgba(26,26,26,0.03)}
.nav-item.active{background:rgba(26,26,26,0.05);color:var(--ink);font-weight:500}
.nav-item svg{flex-shrink:0}
.sidebar-user-card{padding:12px;border-top:0.5px solid rgba(26,26,26,0.06)}
.user-card-inner{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;cursor:pointer;transition:background 120ms ease}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-style:italic;font-weight:300;color:var(--ink-soft);flex-shrink:0;border:2px solid #fff}
.avatar-sm{width:30px;height:30px;font-size:12px}
.avatar-1{background:linear-gradient(135deg,#d8d3c8,#c4bfb3)}
.av-info{background:#dde7f0;color:#244164;border-color:#dde7f0}
.av-warm{background:#f0e8dc;color:#6b4a26;border-color:#f0e8dc}
.av-cool{background:#dde8e0;color:#245534;border-color:#dde8e0}
.av-muted{background:#f0efeb;color:#6b6b66;border-color:#f0efeb}
.main{flex:1;padding:36px 48px;min-width:0;max-width:880px}
.card{background:#fff;border:0.5px solid var(--rule);border-radius:12px;padding:22px 24px}
.card-warm{background:var(--paper-warm);border-radius:12px;padding:28px 28px}
.pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:100px;font-family:var(--sans);font-size:11px;font-weight:500;letter-spacing:0.02em}
.pill-ready,.pill-green{background:var(--green-soft);color:var(--green)}
.pill-amber{background:var(--amber-soft);color:var(--amber)}
.pill-neutral{background:var(--paper-warm);color:var(--ink-soft)}
.pill-red{background:var(--red-soft);color:var(--red)}
.pill-dot{width:6px;height:6px;border-radius:50%}
.dot-green{background:var(--green)}
.dot-amber{background:var(--amber)}
.dot-red{background:var(--red)}
.btn{font-family:var(--sans);font-size:13px;font-weight:500;padding:10px 18px;border-radius:4px;cursor:pointer;letter-spacing:-0.005em;transition:background 160ms ease,border-color 160ms ease;display:inline-flex;align-items:center;gap:8px;text-decoration:none;border:0.5px solid transparent;background:none}
.btn-primary{color:#fff;background:var(--ink);border-color:var(--ink)}
.btn-primary:hover{opacity:0.88}
.btn-primary:disabled{opacity:0.45;cursor:default}
.btn-secondary{color:var(--ink);background:transparent;border-color:var(--rule-strong)}
.btn-secondary:hover{background:rgba(26,26,26,0.03)}
.btn-danger{color:var(--red);background:transparent;border-color:rgba(196,77,77,0.28)}
.btn-danger:hover{background:var(--red-soft)}
.btn-sm{font-size:12px;padding:6px 12px}
.icon{width:16px;height:16px;flex-shrink:0;display:inline-block;vertical-align:middle}
.form-field{margin-bottom:12px}
.form-label{font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:5px;display:block}
.form-input{width:100%;padding:8px 11px;border:0.5px solid var(--rule-strong);border-radius:6px;font-family:var(--sans);font-size:13px;color:var(--ink);background:#fff;outline:none;transition:border-color 120ms ease}
.form-input:focus{border-color:var(--ink)}
.form-actions{display:flex;gap:8px;align-items:center;margin-top:18px}
.form-error{color:var(--red);font-size:12px;margin-top:6px;display:none}
.modal-overlay{position:fixed;inset:0;background:rgba(26,26,26,0.32);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity 160ms ease;padding:20px}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:16px;padding:26px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 48px rgba(26,26,26,0.14)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-close{width:28px;height:28px;border-radius:50%;border:none;background:var(--paper-warm);cursor:pointer;color:var(--ink-mute);font-size:17px;line-height:1;display:flex;align-items:center;justify-content:center}
.tab-bar{display:flex;gap:2px;border-bottom:0.5px solid var(--rule);margin-bottom:16px}
.tab-btn{font-family:var(--sans);font-size:13px;font-weight:400;padding:8px 14px;background:none;border:none;cursor:pointer;color:var(--ink-mute);border-bottom:2px solid transparent;margin-bottom:-0.5px}
.tab-btn.active{color:var(--ink);font-weight:500;border-bottom-color:var(--ink)}
.toast{position:fixed;bottom:26px;right:26px;background:var(--ink);color:#fff;padding:10px 17px;border-radius:8px;font-size:13px;z-index:2000;opacity:0;transform:translateY(6px);transition:opacity 200ms ease,transform 200ms ease;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.divider{border:none;border-top:0.5px solid var(--rule);margin:32px 0}
/* Readiness table */
.readiness-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.readiness-table{width:100%;border-collapse:collapse;font-size:13px}
.readiness-table th{font-family:var(--sans);font-size:11px;font-weight:500;letter-spacing:0.08em;color:var(--ink-mute);padding:8px 14px;border-bottom:0.5px solid var(--rule-strong);text-align:center;line-height:1.35;white-space:normal;max-width:120px}
.readiness-table th:first-child{text-align:left;padding-left:0;letter-spacing:0.1em;text-transform:uppercase;white-space:nowrap;min-width:130px}
.readiness-table td{padding:10px 14px;border-bottom:0.5px solid var(--rule);text-align:center;vertical-align:middle}
.readiness-table td:first-child{text-align:left;padding-left:0}
.readiness-table tbody tr:last-child td{border-bottom:none}
.member-row{display:flex;align-items:center;gap:8px}
.status-icon{font-size:15px;cursor:default}
@media(max-width:767px){.main{padding:24px 20px}.readiness-table th,.readiness-table td{padding:8px 10px}}
</style>
</head>

<script>
var _API="https://0wsxmo9ftg.execute-api.us-east-1.amazonaws.com/prod";
var _CD="https://uniprofile-auth.auth.us-east-1.amazoncognito.com";
var _CID="2heljmdli4f9cv2i4m0i020mfc";
var _tok=null,_uid=null;
var _trip=null,_group=null,_readiness=null,_familyProfile=null;

function _loginUrl(){return _CD+"/login?client_id="+_CID+"&response_type=token&scope=email+openid+profile&redirect_uri="+encodeURIComponent(window.location.origin+window.location.pathname);}
function _ph(){var p=new URLSearchParams(window.location.hash.slice(1));return p.get("id_token")||p.get("access_token");}
async function _req(method,ep,body){
  var o={method:method,headers:{Authorization:"Bearer "+_tok}};
  if(body){o.headers["Content-Type"]="application/json";o.body=JSON.stringify(body);}
  var r=await fetch(_API+ep,o);
  if(r.status===401){localStorage.removeItem("up_token");location.href=_loginUrl();throw new Error("unauth");}
  if(!r.ok)throw new Error("HTTP "+r.status);
  return r.json();
}
function _st(id,v){var e=document.getElementById(id);if(e)e.textContent=v;}
function _ht(id,v){var e=document.getElementById(id);if(e)e.innerHTML=v;}
function _show(id){var e=document.getElementById(id);if(e)e.style.display="";}
function escHtml(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function showToast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},3000);}

function _dn(p){if(!p)return"Traveler";if(p.display_name&&p.display_name.trim())return p.display_name.trim();if(p.identity&&p.identity.legal_first)return p.identity.legal_first;return p.uniprofile_number||p.email||"Traveler";}
function _ini(p){var s=_dn(p).trim();return s.length>=2?s.slice(0,2).toUpperCase():s.toUpperCase();}
function _sidebarUpdate(p){
  _st("sidebar-number",p.uniprofile_number||"—");
  _st("sidebar-name",_dn(p));
  _st("sidebar-avatar",_ini(p));
  _st("sidebar-tier",(p.tier||"free").charAt(0).toUpperCase()+(p.tier||"free").slice(1));
}
async function _auth(){
  var h=_ph();
  if(h){_tok=h;localStorage.setItem("up_token",_tok);history.replaceState(null,"",window.location.pathname+window.location.search);}
  else _tok=localStorage.getItem("up_token");
  if(!_tok){location.href=_loginUrl();return false;}
  return true;
}

/* ── Date / display helpers ── */
function _fmt(s){if(!s)return"—";return new Date(s+"T00:00:00").toLocaleDateString("en-US",{day:"numeric",month:"long",year:"numeric"});}
function _fmtShort(s){if(!s)return"—";return new Date(s+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});}
function _fmtRange(dep,ret){
  if(!dep)return"—";
  var d=new Date(dep+"T00:00:00"),opts={month:"short",day:"numeric"};
  var yr="'"+String(d.getFullYear()).slice(2);
  var s=d.toLocaleDateString("en-US",opts);
  if(ret)s+=" – "+new Date(ret+"T00:00:00").toLocaleDateString("en-US",opts);
  return s+", "+yr;
}
function _nightCount(dep,ret){
  if(!dep||!ret)return 0;
  return Math.max(0,Math.round((new Date(ret+"T00:00:00")-new Date(dep+"T00:00:00"))/86400000));
}
function _tripName(t){return t.trip_name||((t.origin_iata||"")+(t.destination_iata?" → "+t.destination_iata:""))||"Trip";}
function _ctxLabel(c){return c==="CORPORATE"?"Business":c==="BLEISURE"?"Bleisure":"Personal";}

/* ── Render trip header ── */
function renderTripHeader(t){
  var today=new Date();today.setHours(0,0,0,0);
  var dep=t.departure_date?new Date(t.departure_date+"T00:00:00"):null;
  var past=dep&&dep<today;
  var route=(t.origin_iata&&t.destination_iata&&t.origin_iata!==t.destination_iata)?t.origin_iata.toUpperCase()+" → "+t.destination_iata.toUpperCase():"";

  _show("trip-header");
  _show("trip-divider");
  _st("trip-eyebrow",past?"Past trip":"Upcoming trip");
  _ht("trip-title",escHtml(_tripName(t)));
  _st("trip-lede",route||(t.destination_iata?t.destination_iata.toUpperCase():""));

  var parts=[];
  if(t.departure_date||t.return_date)parts.push(_fmtRange(t.departure_date,t.return_date));
  var nights=_nightCount(t.departure_date,t.return_date);
  if(nights>0)parts.push(nights+" night"+(nights===1?"":"s"));
  if(t.trip_context)parts.push(_ctxLabel(t.trip_context));
  if(t.trip_locator)parts.push("PNR "+t.trip_locator.toUpperCase());

  var detHtml='<div class="card"><div style="font-size:13px;color:var(--ink-soft);line-height:1.8">'+escHtml(parts.join(" · "))+'</div>';
  if(t.notes)detHtml+='<div class="caption" style="margin-top:10px;font-style:italic">'+escHtml(t.notes)+'</div>';
  detHtml+='</div>';
  _ht("trip-details",detHtml);
}

/* ── Render group section ── */
function renderGroupSection(){
  var html='';

  /* Section header row */
  html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">';
  html+='<div class="section-label">Trip Group</div>';
  if(_group){
    html+='<div style="display:flex;gap:6px">';
    html+='<button class="btn btn-secondary btn-sm" onclick="openAddMember()">Add member</button>';
    html+='<button class="btn btn-secondary btn-sm" onclick="openRename()">Rename</button>';
    if(!_group.archived_at)html+='<button class="btn btn-secondary btn-sm" style="color:var(--ink-mute)" onclick="archiveGroup()">Archive</button>';
    html+='</div>';
  }
  html+='</div>';

  if(!_group){
    /* Empty state */
    html+='<div class="card-warm">';
    html+='<div class="h2" style="margin-bottom:10px">No group yet</div>';
    html+='<p style="font-size:14px;color:var(--ink-soft);margin-bottom:20px;line-height:1.6">Create a trip group to coordinate travel readiness with your companions — track passports, share documents, and see who\'s ready at a glance.</p>';
    html+='<button class="btn btn-primary" onclick="createGroup()">Create Trip Group</button>';
    html+='</div>';
  }else{
    /* Group name + meta */
    html+='<div style="margin-bottom:22px">';
    html+='<div class="h2" style="margin-bottom:4px">'+escHtml(_group.name)+'</div>';
    var gmeta=[];
    if(_group.destination_name)gmeta.push(escHtml(_group.destination_name));
    if(_group.departure_date||_group.return_date)gmeta.push(escHtml(_fmtRange(_group.departure_date,_group.return_date)));
    if(gmeta.length)html+='<div class="caption" style="margin-bottom:8px">'+gmeta.join(" · ")+'</div>';
    if(_group.archived_at)html+='<span class="pill pill-neutral" style="font-size:10px">Archived '+escHtml(_fmtShort(_group.archived_at.slice(0,10)))+'</span>';
    html+='</div>';

    /* Member list */
    html+=renderMemberList(_group.members||[]);

    /* Readiness matrix */
    if(_readiness&&_readiness.members&&_readiness.members.length){
      html+='<div style="margin-top:32px">';
      html+='<div style="font-size:11px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:12px">Readiness — '+escHtml(_readiness.destination_name||_readiness.destination||"")+'</div>';
      /* Summary pills */
      var s=_readiness.summary||{};
      html+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px">';
      if(s.ready>0)html+='<span class="pill pill-green"><span class="pill-dot dot-green"></span>'+s.ready+(s.ready===1?" ready":" ready")+'</span>';
      if(s.action_needed>0)html+='<span class="pill pill-amber"><span class="pill-dot dot-amber"></span>'+s.action_needed+' action needed</span>';
      if(s.blocked>0)html+='<span class="pill pill-red"><span class="pill-dot dot-red"></span>'+s.blocked+' blocked</span>';
      html+='</div>';
      html+=renderReadinessMatrix(_readiness);
      html+='</div>';
    }
  }

  _ht("group-section",html);
}

/* ── Member list ── */
function renderMemberList(members){
  if(!members.length)return'<div class="caption" style="padding:12px 0;color:var(--ink-mute)">No members yet.</div>';
  var html='<div>';
  members.forEach(function(m){
    var avClass="av-"+(m.avatar_color||"muted");
    var roleLabel=m.role==="organizer"?"Organizer":"Member";
    var kindLabel=m.kind==="self"?"You":m.kind==="linked"?"Linked":"Named-only";
    var rm=_readiness?(_readiness.members||[]).find(function(r){return r.member_id===m.id;}):null;
    var badge="";
    if(rm){
      var st=rm.overall_status;
      badge=st==="ready"?'<span class="pill pill-green" style="font-size:10px">Ready</span>'
        :st==="action_needed"?'<span class="pill pill-amber" style="font-size:10px">Action needed</span>'
        :st==="blocked"?'<span class="pill pill-red" style="font-size:10px">Blocked</span>':"";
    }
    html+='<div style="display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:0.5px solid var(--rule)">';
    html+='<div class="avatar avatar-sm '+avClass+'">'+escHtml((m.display_name||"?").slice(0,2).toUpperCase())+'</div>';
    html+='<div style="flex:1;min-width:0">';
    html+='<div style="font-size:13px;font-weight:500;line-height:1.2">'+escHtml(m.display_name||"Member")+'</div>';
    html+='<div class="caption">'+escHtml(kindLabel)+' · '+escHtml(roleLabel)+'</div>';
    html+='</div>';
    if(badge)html+='<div>'+badge+'</div>';
    if(m.kind!=="self"){
      html+='<button class="btn btn-secondary btn-sm" style="padding:4px 9px;font-size:11px;color:var(--ink-mute)" onclick="removeMember(\''+escHtml(m.id)+'\')">Remove</button>';
    }
    html+='</div>';
  });
  html+='</div>';
  return html;
}

/* ── Readiness matrix ── */
function renderReadinessMatrix(readiness){
  var members=readiness.members||[];
  if(!members.length)return'';

  /* Collect all unique check IDs in order of first appearance */
  var colIds=[],colLabels={};
  members.forEach(function(m){
    (m.checks||[]).forEach(function(c){
      if(colIds.indexOf(c.id)===-1){colIds.push(c.id);colLabels[c.id]=c.label||c.id;}
    });
  });

  /* Build per-member check lookup */
  var checkMap={};
  members.forEach(function(m){
    checkMap[m.member_id]={};
    (m.checks||[]).forEach(function(c){checkMap[m.member_id][c.id]=c;});
  });

  function statusIcon(check){
    if(!check)return'<span style="color:var(--ink-faint);font-size:13px">–</span>';
    var d=escHtml(check.detail||"");
    var t=d?' title="'+d+'"':"";
    if(check.status==="passed")return'<span class="status-icon" style="color:var(--green)"'+t+'>✓</span>';
    if(check.status==="failed")return'<span class="status-icon" style="color:var(--red)"'+t+'>✗</span>';
    if(check.status==="warning")return'<span class="status-icon" style="color:var(--amber)"'+t+'>⚠</span>';
    if(check.status==="info")return'<span class="status-icon" style="color:var(--ink-mute);font-size:13px;cursor:help"'+t+'>ℹ</span>';
    if(check.status==="pending")return'<span class="status-icon" style="color:var(--amber);font-size:12px;letter-spacing:1px"'+t+'>···</span>';
    return'<span style="color:var(--ink-faint)">–</span>';
  }

  function overallCell(status){
    if(status==="ready")return'<span class="pill pill-green" style="font-size:10px">Ready</span>';
    if(status==="action_needed")return'<span class="pill pill-amber" style="font-size:10px">Action needed</span>';
    if(status==="blocked")return'<span class="pill pill-red" style="font-size:10px">Blocked</span>';
    return'<span class="pill pill-neutral" style="font-size:10px">'+escHtml(status||"—")+'</span>';
  }

  var html='<div class="readiness-wrap"><table class="readiness-table"><thead><tr>';
  html+='<th>Member</th>';
  colIds.forEach(function(cid){html+='<th>'+escHtml(colLabels[cid])+'</th>';});
  html+='<th>Overall</th>';
  html+='</tr></thead><tbody>';

  members.forEach(function(m){
    var avClass="av-"+(m.avatar_color||"muted");
    html+='<tr><td>';
    html+='<div class="member-row"><div class="avatar avatar-sm '+avClass+'">'+escHtml((m.display_name||"?").slice(0,2).toUpperCase())+'</div>';
    html+='<span style="font-weight:500;white-space:nowrap">'+escHtml(m.display_name||"Member")+'</span></div>';
    html+='</td>';
    colIds.forEach(function(cid){
      var chk=checkMap[m.member_id]?checkMap[m.member_id][cid]:null;
      html+='<td>'+statusIcon(chk)+'</td>';
    });
    html+='<td>'+overallCell(m.overall_status)+'</td>';
    html+='</tr>';
  });

  html+='</tbody></table></div>';
  if(readiness.disclaimer)html+='<p class="caption" style="margin-top:12px;font-style:italic;max-width:560px">'+escHtml(readiness.disclaimer)+'</p>';
  return html;
}

/* ── Actions ── */
async function createGroup(){
  if(!_trip)return;
  try{
    var name=(_trip.trip_name||_trip.destination_iata||"Trip")+" group";
    await _req("POST","/api/v1/trips/"+_trip.id+"/group",{name:name});
    window.location.reload();
  }catch(e){
    if(e.message&&e.message.includes("409"))showToast("A group already exists for this trip.");
    else showToast("Failed to create group.");
  }
}

async function archiveGroup(){
  if(!_group)return;
  if(!confirm("Archive this trip group? It will move to the archived list."))return;
  try{
    await _req("POST","/api/v1/trip-groups/"+_group.id+"/archive",{});
    showToast("Group archived.");
    window.location.reload();
  }catch(e){showToast("Failed to archive group.");}
}

async function removeMember(memberId){
  if(!_group)return;
  if(!confirm("Remove this member from the group?"))return;
  try{
    await _req("DELETE","/api/v1/trip-groups/"+_group.id+"/members/"+memberId);
    showToast("Member removed.");
    window.location.reload();
  }catch(e){showToast("Failed to remove member.");}
}

/* ── Rename modal ── */
function openRename(){
  if(!_group)return;
  document.getElementById("rename-input").value=_group.name;
  document.getElementById("rename-modal").classList.add("open");
  setTimeout(function(){document.getElementById("rename-input").focus();},160);
}
function closeRename(){document.getElementById("rename-modal").classList.remove("open");}
async function submitRename(){
  var name=document.getElementById("rename-input").value.trim();
  if(!name){return;}
  try{
    await _req("PATCH","/api/v1/trip-groups/"+_group.id,{name:name});
    showToast("Group renamed.");
    closeRename();
    window.location.reload();
  }catch(e){showToast("Failed to rename group.");}
}

/* ── Add member modal ── */
var _amTab="named";
function openAddMember(){
  if(!_group)return;
  document.getElementById("add-member-modal").classList.add("open");
  _ht("am-named-panel","<div class='caption' style='padding:16px 0;color:var(--ink-mute)'>Loading…</div>");
  _ht("am-linked-panel","<div class='caption' style='padding:16px 0;color:var(--ink-mute)'>Loading…</div>");
  document.getElementById("am-error").style.display="none";
  switchAmTab("named");
  loadFamilyForModal();
}
function closeAddMember(){document.getElementById("add-member-modal").classList.remove("open");}
function switchAmTab(tab){
  _amTab=tab;
  document.querySelectorAll("#am-tabs .tab-btn").forEach(function(b,i){
    b.classList.toggle("active",(i===0&&tab==="named")||(i===1&&tab==="linked"));
  });
  document.getElementById("am-named-panel").style.display=tab==="named"?"":"none";
  document.getElementById("am-linked-panel").style.display=tab==="linked"?"":"none";
}
async function loadFamilyForModal(){
  if(_familyProfile){renderAmPanels();return;}
  try{
    _familyProfile=await _req("GET","/api/v1/family/"+_uid);
    renderAmPanels();
  }catch(e){
    _ht("am-named-panel","<div class='caption' style='padding:12px 0;color:var(--red)'>Failed to load people.</div>");
  }
}
function renderAmPanels(){
  if(!_familyProfile||!_group)return;
  var currentNamedIds=new Set((_group.members||[]).map(function(m){return m.named_only_id;}).filter(Boolean));
  var currentLinkedUuids=new Set((_group.members||[]).map(function(m){return m.linked_uuid;}).filter(Boolean));

  /* Named-only tab */
  var named=(_familyProfile.named_only||[]).filter(function(n){return!currentNamedIds.has(n.id);});
  if(!named.length){
    _ht("am-named-panel","<div class='caption' style='padding:14px 0;color:var(--ink-mute)'>No named-only people to add. <a href='/people.html' style='color:var(--ink-soft)'>Add them on the People page.</a></div>");
  }else{
    var h="<div>";
    named.forEach(function(n){
      var av="av-"+(n.avatar_color||"muted");
      h+='<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--rule)">';
      h+='<div class="avatar avatar-sm '+av+'">'+escHtml((n.display_name||"?").slice(0,2).toUpperCase())+'</div>';
      h+='<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500">'+escHtml(n.display_name)+'</div>';
      if(n.relationship)h+='<div class="caption">'+escHtml(n.relationship)+'</div>';
      h+='</div>';
      h+='<button class="btn btn-secondary btn-sm" onclick="addNamedMember(\''+escHtml(n.id)+'\')">Add</button>';
      h+='</div>';
    });
    h+='</div>';
    _ht("am-named-panel",h);
  }

  /* Linked tab */
  var linked=(_familyProfile.linked||[]).filter(function(l){return!currentLinkedUuids.has(l.uuid);});
  if(!linked.length){
    _ht("am-linked-panel","<div class='caption' style='padding:14px 0;color:var(--ink-mute)'>No linked people to add. <a href='/people.html' style='color:var(--ink-soft)'>Link people on the People page.</a></div>");
  }else{
    var h2="<div>";
    linked.forEach(function(l){
      h2+='<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--rule)">';
      h2+='<div class="avatar avatar-sm av-info">'+escHtml((l.name||"?").slice(0,2).toUpperCase())+'</div>';
      h2+='<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500">'+escHtml(l.name||l.email||"Linked person")+'</div>';
      if(l.email)h2+='<div class="caption">'+escHtml(l.email)+'</div>';
      h2+='</div>';
      h2+='<button class="btn btn-secondary btn-sm" onclick="addLinkedMember(\''+escHtml(l.uuid)+'\')">Add</button>';
      h2+='</div>';
    });
    h2+='</div>';
    _ht("am-linked-panel",h2);
  }
}
async function addNamedMember(namedOnlyId){
  var errEl=document.getElementById("am-error");
  errEl.style.display="none";
  try{
    await _req("POST","/api/v1/trip-groups/"+_group.id+"/members",{kind:"named_only",named_only_id:namedOnlyId});
    closeAddMember();
    showToast("Member added.");
    window.location.reload();
  }catch(e){
    errEl.textContent="Failed to add member. "+(e.message||"");
    errEl.style.display="block";
  }
}
async function addLinkedMember(linkedUuid){
  var errEl=document.getElementById("am-error");
  errEl.style.display="none";
  try{
    await _req("POST","/api/v1/trip-groups/"+_group.id+"/members",{kind:"linked",linked_uuid:linkedUuid});
    closeAddMember();
    showToast("Member added. A data sharing request has been sent.");
    window.location.reload();
  }catch(e){
    errEl.textContent="Failed to add member. "+(e.message||"");
    errEl.style.display="block";
  }
}

/* ── Init ── */
async function tripInit(){
  if(!await _auth())return;
  var params=new URLSearchParams(window.location.search);
  var tripId=params.get("id");
  if(!tripId){_ht("group-section","<div class='caption' style='color:var(--ink-mute);padding:20px 0'>No trip specified.</div>");return;}
  try{
    var p=await _req("GET","/api/v1/me");
    _uid=p.uuid;
    _sidebarUpdate(p);
    _trip=(p.trips||[]).find(function(t){return t.id===tripId;});
    if(!_trip){
      document.title="Trip not found — UniProfile";
      _ht("group-section","<div class='caption' style='color:var(--ink-mute);padding:20px 0'>Trip not found.</div>");
      return;
    }
    document.title=(_trip.trip_name||"Trip")+" — UniProfile";
    renderTripHeader(_trip);

    if(_trip.trip_group_id){
      try{
        var results=await Promise.all([
          _req("GET","/api/v1/trip-groups/"+_trip.trip_group_id),
          _req("GET","/api/v1/trip-groups/"+_trip.trip_group_id+"/readiness"),
        ]);
        _group=results[0];
        _readiness=results[1];
      }catch(e){
        console.error("Failed to load group data:",e);
      }
    }
    renderGroupSection();
  }catch(e){
    console.error(e);
    _ht("group-section","<div class='caption' style='color:var(--red);padding:20px 0'>Failed to load trip.</div>");
  }
}
tripInit();
</script>
