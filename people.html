<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>People — UniProfile</title>
<meta name="robots" content="noindex,nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,300;9..144,0,400;9..144,1,300;9..144,1,400&family=Inter+Tight:wght@400;500&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

<style>
:root{--ink:#1a1a1a;--ink-soft:#4a4a48;--ink-mute:#8a8a86;--ink-faint:#b8b8b3;--paper:#faf8f4;--paper-warm:#f3efe7;--paper-cream:#f9f7f2;--rule:rgba(26,26,26,0.08);--rule-strong:rgba(26,26,26,0.18);--field-bg:#fff;--green:#2d6a4f;--green-soft:#e8efe9;--amber:#ba7517;--amber-soft:#f9f1e3;--red:#c44d4d;--red-soft:#f4e8e8;--serif:'Fraunces',Georgia,serif;--sans:'Inter Tight',-apple-system,sans-serif;--mono:'JetBrains Mono','SF Mono',Menlo,monospace}
*{box-sizing:border-box;margin:0;padding:0}html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);line-height:1.55;font-size:14px;font-weight:400}
.h1{font-family:var(--serif);font-weight:300;font-size:clamp(36px,5vw,52px);line-height:1.1;letter-spacing:-0.02em;color:var(--ink)}
.h1 em{font-style:italic;font-weight:300}
.h2{font-family:var(--serif);font-weight:400;font-size:24px;line-height:1.2;letter-spacing:-0.01em;color:var(--ink)}
.h3{font-family:var(--serif);font-weight:400;font-size:18px;line-height:1.25;letter-spacing:-0.005em;color:var(--ink)}
.lede{font-family:var(--serif);font-weight:300;font-size:17px;line-height:1.5;letter-spacing:-0.005em;color:var(--ink-soft)}
.eyebrow{font-family:var(--sans);font-size:11px;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-mute)}
.section-label{font-family:var(--sans);font-size:12px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink)}
.micro-label{font-family:var(--sans);font-size:10px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-mute)}
.body{font-size:14px;line-height:1.55;color:var(--ink-soft)}
.caption{font-size:12px;line-height:1.5;color:var(--ink-mute)}
.editorial{font-family:var(--serif);font-style:italic;font-weight:400;font-size:16px;color:var(--ink)}
.id{font-family:var(--mono);font-size:13px;font-weight:500;letter-spacing:0.04em;color:var(--ink)}
.shell{display:flex;min-height:100vh}
.sidebar{width:240px;background:#fff;border-right:0.5px solid var(--rule);padding:28px 0;flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.sidebar-wordmark-block{padding:0 24px 24px;border-bottom:0.5px solid rgba(26,26,26,0.06)}
.wordmark{font-family:var(--serif);font-size:22px;font-weight:400;letter-spacing:-0.01em;line-height:1;color:var(--ink);text-decoration:none;display:block}
.wordmark em{font-style:italic;font-weight:300}
.wordmark-tag{font-family:var(--sans);font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-mute);font-weight:500;margin-top:6px}
.sidebar-id-block{padding:18px 24px;border-bottom:0.5px solid rgba(26,26,26,0.06)}
.sidebar-id-label{font-family:var(--sans);font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-mute);font-weight:500;margin-bottom:6px}
.sidebar-nav{padding:20px 12px;flex:1}
.sidebar-nav-label{font-family:var(--sans);font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-faint);font-weight:500;padding:0 12px 12px}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:6px;text-decoration:none;color:var(--ink-soft);font-size:14px;font-weight:400;margin-bottom:2px;transition:background 120ms ease}
.nav-item:hover{background:rgba(26,26,26,0.03)}
.nav-item.active{background:rgba(26,26,26,0.05);color:var(--ink);font-weight:500}
.nav-item svg{flex-shrink:0}
.sidebar-user-card{padding:12px;border-top:0.5px solid rgba(26,26,26,0.06)}
.user-card-inner{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;cursor:pointer;transition:background 120ms ease}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-style:italic;font-weight:300;color:var(--ink-soft);flex-shrink:0;border:2px solid #fff}
.avatar-sm{width:30px;height:30px;font-size:12px}
.avatar-md{width:36px;height:36px;font-size:13px}
.avatar-1{background:linear-gradient(135deg,#d8d3c8,#c4bfb3)}
.avatar-2{background:linear-gradient(135deg,#e0d5c8,#cfc2b0)}
.avatar-3{background:linear-gradient(135deg,#d4ccd8,#c0b6c8)}
.avatar-4{background:linear-gradient(135deg,#d8d3d8,#c4bfc4)}
.avatar-5{background:linear-gradient(135deg,#cdc8d8,#b8b2c8)}
.avatar-stack{display:flex;align-items:center}
.avatar-stack .avatar:not(:first-child){margin-left:-8px}
.main{flex:1;padding:36px 48px;min-width:0;max-width:880px}
.page-header{margin-bottom:36px}
.page-header .eyebrow{margin-bottom:12px}
.page-header .h1{margin-bottom:8px}
.section{margin-bottom:36px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card{background:#fff;border:0.5px solid var(--rule);border-radius:12px;padding:22px 24px}
.card-strong{border:0.5px solid var(--rule-strong)}
.card-warm{background:var(--paper-warm);border-radius:12px;padding:22px 26px}
.pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:100px;font-family:var(--sans);font-size:11px;font-weight:500;letter-spacing:0.02em}
.pill-ready{background:var(--green-soft);color:var(--green)}
.pill-amber{background:var(--amber-soft);color:var(--amber)}
.pill-neutral{background:var(--paper-warm);color:var(--ink-soft)}
.pill-dot{width:6px;height:6px;border-radius:50%}
.dot-green{background:var(--green)}
.dot-amber{background:var(--amber)}
.btn{font-family:var(--sans);font-size:13px;font-weight:500;padding:10px 18px;border-radius:4px;cursor:pointer;letter-spacing:-0.005em;transition:background 160ms ease,border-color 160ms ease;display:inline-flex;align-items:center;gap:8px;text-decoration:none;border:0.5px solid transparent;background:none}
.btn-primary{color:#fff;background:var(--ink);border-color:var(--ink)}
.btn-primary:disabled{opacity:0.5;cursor:default}
.btn-secondary{color:var(--ink);background:transparent;border-color:var(--rule-strong)}
.btn-sm{font-size:12px;padding:7px 13px}
.link{color:var(--ink);text-decoration:underline;text-underline-offset:2px;text-decoration-thickness:0.5px;font-size:12px}
.icon{width:16px;height:16px;flex-shrink:0;display:inline-block;vertical-align:middle}
@media(max-width:900px){.shell{flex-direction:column}.sidebar{width:100%;height:auto;position:relative;padding:16px 0}.sidebar-wordmark-block,.sidebar-id-block{padding:12px 24px}.sidebar-nav{padding:12px;display:flex;gap:4px;flex-wrap:wrap}.sidebar-nav-label{display:none}.nav-item{padding:8px 12px}.sidebar-user-card{display:none}.main{padding:24px;max-width:none}}

/* Form */
.form-field{margin-bottom:14px}
.form-label{font-size:11px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:6px;display:block}
.form-input{width:100%;padding:9px 12px;border:0.5px solid var(--rule-strong);border-radius:6px;font-family:var(--sans);font-size:13px;color:var(--ink);background:#fff;outline:none;transition:border-color 120ms ease;-webkit-appearance:none}
.form-input:focus{border-color:var(--ink)}
.form-actions{display:flex;gap:8px;margin-top:14px;align-items:center}
.form-error{color:var(--red);font-size:12px;margin-top:8px;display:none}
.form-success{color:var(--green);font-size:12px;margin-top:8px;display:none}

/* Invite panel */
.invite-panel{background:var(--paper-cream);border:0.5px solid var(--rule);border-radius:12px;padding:20px 22px;margin-top:16px}
.invite-panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}

/* Toast */
.toast{position:fixed;bottom:28px;right:28px;background:var(--ink);color:#fff;padding:11px 18px;border-radius:8px;font-size:13px;z-index:2000;opacity:0;transform:translateY(6px);transition:opacity 200ms ease,transform 200ms ease;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
</style>
</head>
<body>

<svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
  <symbol id="i-home" viewBox="0 0 24 24" fill="none"><path d="M4 11L12 4L20 11V19C20 19.55 19.55 20 19 20H5C4.45 20 4 19.55 4 19V11Z" stroke="currentColor" stroke-width="1.25" stroke-linejoin="round"/><path d="M10 20V14H14V20" stroke="currentColor" stroke-width="1.25" stroke-linejoin="round"/></symbol>
  <symbol id="i-me" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="9" r="3.5" stroke="currentColor" stroke-width="1.25"/><path d="M5 20C5 16 8 14 12 14C16 14 19 16 19 20" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/></symbol>
  <symbol id="i-people" viewBox="0 0 24 24" fill="none"><circle cx="9" cy="9" r="3" stroke="currentColor" stroke-width="1.25"/><circle cx="17" cy="10" r="2.2" stroke="currentColor" stroke-width="1.25"/><path d="M3 19C3 16 5.7 14 9 14C12.3 14 15 16 15 19" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/><path d="M15 18C15 15.5 16.5 14 17 14C19 14 21 15.5 21 18" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/></symbol>
  <symbol id="i-trips" viewBox="0 0 24 24" fill="none"><path d="M3 17L9 11L13 15L21 7" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/><circle cx="9" cy="11" r="1.2" fill="currentColor"/><circle cx="13" cy="15" r="1.2" fill="currentColor"/><circle cx="21" cy="7" r="1.2" fill="currentColor"/><circle cx="3" cy="17" r="1.2" fill="currentColor"/></symbol>
  <symbol id="i-privacy" viewBox="0 0 24 24" fill="none"><rect x="5" y="11" width="14" height="9" rx="1" stroke="currentColor" stroke-width="1.25"/><path d="M8 11V8C8 5.79 9.79 4 12 4C14.21 4 16 5.79 16 8V11" stroke="currentColor" stroke-width="1.25"/><circle cx="12" cy="15.5" r="1" fill="currentColor"/></symbol>
  <symbol id="i-chevron" viewBox="0 0 24 24" fill="none"><path d="M9 6L15 12L9 18" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/></symbol>
  <symbol id="i-add" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.25"/><path d="M12 8V16M8 12H16" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/></symbol>
</svg>

<div class="shell">

  <aside class="sidebar">
    <div class="sidebar-wordmark-block">
      <a href="home.html" class="wordmark">Uni<em>Profile</em></a>
      <div class="wordmark-tag">Travel identity</div>
    </div>
    <div class="sidebar-id-block">
      <div class="sidebar-id-label">Your number</div>
      <div class="id" id="sidebar-number">—</div>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-nav-label">Navigate</div>
      <a href="home.html" class="nav-item"><svg class="icon"><use href="#i-home"/></svg>Home</a>
      <a href="me.html" class="nav-item"><svg class="icon"><use href="#i-me"/></svg>Me</a>
      <a href="people.html" class="nav-item active"><svg class="icon"><use href="#i-people"/></svg>People</a>
      <a href="trips.html" class="nav-item"><svg class="icon"><use href="#i-trips"/></svg>Trips</a>
      <a href="privacy.html" class="nav-item"><svg class="icon"><use href="#i-privacy"/></svg>Privacy</a>
    </nav>
    <div class="sidebar-user-card">
      <div class="user-card-inner">
        <div class="avatar avatar-sm avatar-1" id="sidebar-avatar">—</div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:13px;font-weight:500;line-height:1.2;" id="sidebar-name">—</div>
          <div class="caption" id="sidebar-tier"></div>
        </div>
        <svg class="icon" style="width:14px;height:14px;color:var(--ink-mute);"><use href="#i-chevron"/></svg>
      </div>
    </div>
  </aside>

  <main class="main">

    <div class="page-header">
      <div class="eyebrow">Your network</div>
      <h1 class="h1">The people you <em>travel with</em>.</h1>
      <p class="lede" id="people-lede">Loading…</p>
    </div>

    <!-- Family links section -->
    <div class="section">
      <div class="section-header">
        <h2 class="section-label">Family links</h2>
        <button class="btn btn-secondary btn-sm" onclick="toggleInvite()">+ Invite member</button>
      </div>

      <div id="family-list"></div>

      <!-- Invite form -->
      <div class="invite-panel" id="invite-panel" style="display:none;">
        <div class="invite-panel-header">
          <span class="section-label" style="font-size:11px;">Send invite</span>
          <button class="btn btn-secondary btn-sm" style="padding:4px 10px;font-size:11px;" onclick="toggleInvite()">Cancel</button>
        </div>
        <div class="form-field">
          <label class="form-label">Email address</label>
          <input class="form-input" type="email" id="invite-email" placeholder="traveler@example.com" />
        </div>
        <div id="invite-error" class="form-error"></div>
        <div id="invite-success" class="form-success"></div>
        <div class="form-actions">
          <button class="btn btn-primary btn-sm" id="invite-btn" onclick="sendInvite()">Send invite</button>
          <span class="caption">They'll receive an email to join UniProfile.</span>
        </div>
      </div>
    </div>

    <!-- Trip groups section -->
    <div class="section" id="groups-section" style="display:none;">
      <div class="section-header">
        <h2 class="section-label">Trip groups</h2>
        <span class="caption" id="groups-count"></span>
      </div>
      <div id="groups-list"></div>
    </div>

  </main>
</div>

<div class="toast" id="toast"></div>

<script>
var _API="https://0wsxmo9ftg.execute-api.us-east-1.amazonaws.com/prod";
var _CD="https://uniprofile-auth.auth.us-east-1.amazoncognito.com";
var _CID="2heljmdli4f9cv2i4m0i020mfc";
var _tok=null,_prof=null,_uid=null;

function _loginUrl(){return _CD+"/login?client_id="+_CID+"&response_type=token&scope=email+openid+profile&redirect_uri="+encodeURIComponent(window.location.origin+window.location.pathname);}
function _ph(){var p=new URLSearchParams(window.location.hash.slice(1));return p.get("id_token")||p.get("access_token");}
async function _req(method,ep,body){
  var o={method:method,headers:{Authorization:"Bearer "+_tok}};
  if(body){o.headers["Content-Type"]="application/json";o.body=JSON.stringify(body);}
  var r=await fetch(_API+ep,o);
  if(r.status===401){localStorage.removeItem("up_token");location.href=_loginUrl();throw new Error("unauth");}
  if(!r.ok)throw new Error("HTTP "+r.status);
  return r.json();
}
function _dn(p){if(!p)return"Traveler";if(p.display_name&&p.display_name.trim())return p.display_name.trim();if(p.identity&&p.identity.legal_first)return p.identity.legal_first;return p.uniprofile_number||p.email||"Traveler";}
function _ini(p){var s=_dn(p).trim();return s.length>=2?s.slice(0,2).toUpperCase():s.toUpperCase();}
function _st(id,v){var e=document.getElementById(id);if(e)e.textContent=v;}
function _ht(id,v){var e=document.getElementById(id);if(e)e.innerHTML=v;}
function _sidebarUpdate(p){
  _st("sidebar-number",p.uniprofile_number||"—");
  _st("sidebar-name",_dn(p));
  _st("sidebar-tier",(p.tier||"free").charAt(0).toUpperCase()+(p.tier||"free").slice(1));
  _st("sidebar-avatar",_ini(p));
}
async function _auth(){
  var h=_ph();
  if(h){_tok=h;localStorage.setItem("up_token",_tok);history.replaceState(null,"",window.location.pathname);}
  else _tok=localStorage.getItem("up_token");
  if(!_tok){location.href=_loginUrl();return false;}
  return true;
}

function showToast(msg){
  var t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(function(){t.classList.remove("show");},3000);
}

var _AV=["avatar-1","avatar-2","avatar-3","avatar-4","avatar-5"];
function _avCol(i){return _AV[i%_AV.length];}

function _famCard(m,i){
  var name=[m.member_first,m.member_last].filter(Boolean).join(" ")||m.member_email||"Member";
  var ini=name.slice(0,2).toUpperCase();
  var sub=m.member_email||"Family link";
  return '<div class="card" style="margin-bottom:10px;display:flex;align-items:center;gap:14px;padding:16px 20px;">'
    +'<div class="avatar avatar-md '+_avCol(i)+'" style="flex-shrink:0;">'+ini+'</div>'
    +'<div style="flex:1;min-width:0;">'
    +'<div style="font-size:14px;font-weight:500;color:var(--ink);">'+name+'</div>'
    +'<div class="caption">'+sub+'</div>'
    +'</div>'
    +'<span class="pill pill-ready"><span class="pill-dot dot-green"></span>Linked</span>'
    +'</div>';
}

function _grpCard(g,i){
  var members=[];
  try{members=typeof g.members==="string"?JSON.parse(g.members):(g.members||[]);}catch(e){}
  var dep=g.dep?new Date(g.dep).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):"";
  var ret=g.ret?new Date(g.ret).toLocaleDateString("en-US",{month:"short",day:"numeric"}):"";
  return '<div class="card '+(i===0?"card-strong":"")+'" style="margin-bottom:10px;">'
    +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">'
    +'<div><div class="micro-label" style="margin-bottom:4px;">'+(g.type||"Group")+'</div>'
    +'<h3 class="'+(i===0?"h2":"h3")+'">'+(g.name||g.destination||"Trip group")+'</h3>'
    +(dep?'<div class="caption" style="margin-top:4px;">'+dep+(ret?" – "+ret:"")+'</div>':"")
    +"</div>"
    +'<span class="pill pill-neutral">Saved</span>'
    +"</div>"
    +(members.length?'<div class="caption">'+members.length+" traveler"+(members.length===1?"":"s")+'</div>':"")
    +"</div>";
}

/* ── Invite ── */
function toggleInvite(){
  var panel=document.getElementById("invite-panel");
  var isOpen=panel.style.display!=="none";
  panel.style.display=isOpen?"none":"block";
  if(!isOpen){
    document.getElementById("invite-email").value="";
    document.getElementById("invite-error").style.display="none";
    document.getElementById("invite-success").style.display="none";
    document.getElementById("invite-email").focus();
  }
}

async function sendInvite(){
  var email=document.getElementById("invite-email").value.trim();
  var errEl=document.getElementById("invite-error");
  var okEl=document.getElementById("invite-success");
  errEl.style.display="none";okEl.style.display="none";
  if(!email||!email.includes("@")){
    errEl.textContent="Enter a valid email address.";errEl.style.display="block";return;
  }
  var btn=document.getElementById("invite-btn");
  btn.disabled=true;btn.textContent="Sending…";
  try{
    await _req("POST","/api/v1/family/"+_uid+"/invite",{email:email});
    okEl.textContent="Invite sent to "+email+". They'll get an email to join.";
    okEl.style.display="block";
    document.getElementById("invite-email").value="";
    showToast("Invite sent.");
    setTimeout(function(){
      toggleInvite();
      peopleRefresh();
    },2000);
  }catch(e){
    errEl.textContent="Failed to send invite: "+(e.message||"Please try again.");
    errEl.style.display="block";
    btn.disabled=false;
    btn.textContent="Send invite";
  }
  btn.disabled=false;btn.textContent="Send invite";
}

/* ── Main init ── */
async function peopleRefresh(){
  try{
    var p=await _req("GET","/api/v1/me");
    _prof=p;_uid=p.uuid;
    _sidebarUpdate(p);

    var groups=p.groups||[];
    var fam=[];
    try{var fr=await _req("GET","/api/v1/family/"+p.uuid);fam=fr.links||fr.family||[];}catch(e){}

    var total=groups.length+fam.length;
    if(total){
      _st("people-lede",fam.length+" family link"+(fam.length===1?"":"s")+(groups.length?" and "+groups.length+" group"+(groups.length===1?"":"s"):"")+" on file.");
    }else{
      _st("people-lede","No links yet. Invite a family member to get started.");
    }

    if(fam.length){
      var fhtml="";
      fam.forEach(function(m,i){fhtml+=_famCard(m,i);});
      _ht("family-list",fhtml);
    }else{
      _ht("family-list","<div style='padding:20px 0;color:var(--ink-mute);font-size:13px;'>No family members linked yet.</div>");
    }

    if(groups.length){
      document.getElementById("groups-section").style.display="";
      _st("groups-count",groups.length);
      var ghtml="";
      groups.forEach(function(g,i){ghtml+=_grpCard(g,i);});
      _ht("groups-list",ghtml);
    }else{
      document.getElementById("groups-section").style.display="none";
    }
  }catch(e){console.error(e);}
}

async function peopleInit(){
  if(!await _auth())return;
  await peopleRefresh();
}
peopleInit();
</script>
</body>
</html>
