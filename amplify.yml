# Canonical deployment: serves index.html from the repo root.
# The React scaffold in _legacy-react-app/ is NOT built or deployed here.
version: 1
frontend:
  phases:
    build:
      commands:
        - echo 'Static site - no build needed'
  artifacts:
    baseDirectory: .
    files:
      - index.html
      - welcome.html
      - feedback.html
      - app.html
      - home.html
      - me.html
      - people.html
      - groups.html
      - trips.html
      - privacy.html
      - icons.html
      - data/**/*
  cache:
    paths: []
