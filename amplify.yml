# Canonical deployment: serves index.html from the repo root.
# The React scaffold in _legacy-react-app/ is NOT built or deployed here.
version: 1
frontend:
  phases:
    build:
      commands:
        - echo 'Static site - no build needed'
  artifacts:
    baseDirectory: .
    files:
      - index.html
      - welcome.html
      - feedback.html
      - app.html
      - home.html
      - me.html
      - people.html
      - groups.html
      - trips.html
      - trip.html
      - trip-group-invite.html
      - privacy.html
      - guide.html
      - icons.html
      - components/**/*
      - data/**/*
  cache:
    paths: []
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: 'Strict-Transport-Security'
          value: 'max-age=31536000'
        - key: 'X-Frame-Options'
          value: 'DENY'
        - key: 'X-Content-Type-Options'
          value: 'nosniff'
        - key: 'Referrer-Policy'
          value: 'strict-origin-when-cross-origin'
