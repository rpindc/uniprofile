<style>
:root{--ink:#1a1a1a;--ink-soft:#4a4a48;--ink-mute:#8a8a86;--ink-faint:#b8b8b3;--paper:#faf8f4;--paper-warm:#f3efe7;--paper-cream:#f9f7f2;--rule:rgba(26,26,26,0.08);--rule-strong:rgba(26,26,26,0.18);--green:#2d6a4f;--green-soft:#e8efe9;--amber:#ba7517;--amber-soft:#f9f1e3;--red:#c44d4d;--red-soft:#f4e8e8;--serif:'Fraunces',Georgia,serif;--sans:'Inter Tight',-apple-system,sans-serif;--mono:'JetBrains Mono','SF Mono',Menlo,monospace}
*{box-sizing:border-box;margin:0;padding:0}html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);line-height:1.55;font-size:14px;font-weight:400}
.h1{font-family:var(--serif);font-weight:300;font-size:clamp(32px,4.5vw,48px);line-height:1.1;letter-spacing:-0.02em;color:var(--ink)}
.h1 em{font-style:italic;font-weight:300}
.h2{font-family:var(--serif);font-weight:400;font-size:22px;line-height:1.2;letter-spacing:-0.01em;color:var(--ink)}
.h3{font-family:var(--serif);font-weight:400;font-size:18px;line-height:1.25;letter-spacing:-0.005em;color:var(--ink)}
.lede{font-family:var(--serif);font-weight:300;font-size:16px;line-height:1.5;letter-spacing:-0.005em;color:var(--ink-soft)}
.eyebrow{font-family:var(--sans);font-size:11px;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-mute)}
.caption{font-size:12px;line-height:1.5;color:var(--ink-mute)}
.shell{display:flex;min-height:100vh}
.sidebar{width:240px;background:#fff;border-right:0.5px solid var(--rule);padding:28px 0;flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.sidebar-wordmark-block{padding:0 24px 24px;border-bottom:0.5px solid rgba(26,26,26,0.06)}
.wordmark{font-family:var(--serif);font-size:22px;font-weight:400;letter-spacing:-0.01em;line-height:1;color:var(--ink);text-decoration:none;display:block}
.wordmark em{font-style:italic;font-weight:300}
.wordmark-tag{font-family:var(--sans);font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-mute);font-weight:500;margin-top:6px}
.sidebar-id-block{padding:18px 24px;border-bottom:0.5px solid rgba(26,26,26,0.06)}
.sidebar-id-label{font-family:var(--sans);font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-mute);font-weight:500;margin-bottom:6px}
.sidebar-nav{padding:20px 12px;flex:1}
.sidebar-nav-label{font-family:var(--sans);font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-faint);font-weight:500;padding:0 12px 12px}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:6px;text-decoration:none;color:var(--ink-soft);font-size:14px;font-weight:400;margin-bottom:2px;transition:background 120ms ease}
.nav-item:hover{background:rgba(26,26,26,0.03)}
.nav-item.active{background:rgba(26,26,26,0.05);color:var(--ink);font-weight:500}
.nav-item svg{flex-shrink:0}
.sidebar-user-card{padding:12px;border-top:0.5px solid rgba(26,26,26,0.06)}
.user-card-inner{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;cursor:pointer;transition:background 120ms ease}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-style:italic;font-weight:300;color:var(--ink-soft);flex-shrink:0;border:2px solid #fff}
.avatar-sm{width:30px;height:30px;font-size:12px}
.avatar-1{background:linear-gradient(135deg,#d8d3c8,#c4bfb3)}
.main{flex:1;padding:36px 48px;min-width:0;max-width:640px}
.icon{width:16px;height:16px;flex-shrink:0;display:inline-block;vertical-align:middle}
.btn{font-family:var(--sans);font-size:13px;font-weight:500;padding:10px 18px;border-radius:4px;cursor:pointer;letter-spacing:-0.005em;transition:background 160ms ease,border-color 160ms ease;display:inline-flex;align-items:center;gap:8px;text-decoration:none;border:0.5px solid transparent;background:none}
.btn-primary{color:#fff;background:var(--ink);border-color:var(--ink)}
.btn-primary:hover{opacity:0.88}
.btn-primary:disabled{opacity:0.45;cursor:default}
.btn-secondary{color:var(--ink);background:transparent;border-color:var(--rule-strong)}
.btn-secondary:hover{background:rgba(26,26,26,0.03)}
.btn-sm{font-size:12px;padding:6px 12px}
/* Invite card */
.invite-card{background:#fff;border:0.5px solid var(--rule);border-radius:16px;padding:36px;margin-top:28px}
.invite-icon{width:64px;height:64px;border-radius:50%;background:var(--paper-warm);display:flex;align-items:center;justify-content:center;margin-bottom:24px}
.invite-meta-row{display:flex;flex-direction:column;gap:6px;margin:24px 0;padding:20px;background:var(--paper-cream);border-radius:10px}
.invite-meta-item{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--ink-soft)}
.invite-meta-label{font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-mute);min-width:88px}
.invite-actions{display:flex;gap:10px;margin-top:28px;flex-wrap:wrap}
.state-icon{font-size:48px;margin-bottom:20px}
.form-error{color:var(--red);font-size:12px;margin-top:8px;display:none}
.form-error.show{display:block}
.scope-section{margin:24px 0;border:0.5px solid var(--rule);border-radius:10px;overflow:hidden}
.scope-section-label{font-size:11px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-mute);padding:12px 16px 10px;border-bottom:0.5px solid var(--rule);background:var(--paper-cream)}
.scope-row{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border-bottom:0.5px solid var(--rule);cursor:pointer}
.scope-row:last-child{border-bottom:none}
.scope-row:hover{background:var(--paper-cream)}
.scope-check{width:15px;height:15px;flex-shrink:0;margin-top:2px;accent-color:var(--ink);cursor:pointer}
.scope-info{flex:1;min-width:0}
.scope-name{font-size:13px;font-weight:500;color:var(--ink);line-height:1.3}
.scope-desc{font-size:12px;color:var(--ink-mute);margin-top:2px;line-height:1.4}
@media(max-width:767px){.main{padding:24px 20px}.invite-card{padding:24px}.invite-actions{flex-direction:column}.invite-actions .btn{width:100%;justify-content:center}}
</style>
</head>

<script>
var _API="https://0wsxmo9ftg.execute-api.us-east-1.amazonaws.com/prod";
var _CD="https://uniprofile-auth.auth.us-east-1.amazoncognito.com";
var _CID="2heljmdli4f9cv2i4m0i020mfc";
var _tok=null,_uid=null;
var _invite=null,_consentId=null;

function _loginUrl(){return _CD+"/login?client_id="+_CID+"&response_type=token&scope=email+openid+profile&redirect_uri="+encodeURIComponent(window.location.origin+"/trip-group-invite.html");}
function _ph(){var p=new URLSearchParams(window.location.hash.slice(1));return p.get("id_token")||p.get("access_token");}
async function _req(method,ep,body){
  var o={method:method,headers:{Authorization:"Bearer "+_tok}};
  if(body){o.headers["Content-Type"]="application/json";o.body=JSON.stringify(body);}
  var r=await fetch(_API+ep,o);
  if(r.status===401){localStorage.removeItem("up_token");location.href=_loginUrl();throw new Error("unauth");}
  if(!r.ok){var err=new Error("HTTP "+r.status);err.status=r.status;try{var j=await r.json();err.serverMessage=j.message||"";}catch(e2){}throw err;}
  return r.json();
}
function _st(id,v){var e=document.getElementById(id);if(e)e.textContent=v;}
function escHtml(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function _dn(p){if(!p)return"Traveler";if(p.display_name&&p.display_name.trim())return p.display_name.trim();if(p.identity&&p.identity.legal_first)return p.identity.legal_first;return p.uniprofile_number||p.email||"Traveler";}
function _ini(p){var s=_dn(p).trim();return s.length>=2?s.slice(0,2).toUpperCase():s.toUpperCase();}
function _sidebarUpdate(p){
  _st("sidebar-number",p.uniprofile_number||"—");
  _st("sidebar-name",_dn(p));
  _st("sidebar-avatar",_ini(p));
  _st("sidebar-tier",(p.tier||"free").charAt(0).toUpperCase()+(p.tier||"free").slice(1));
}
async function _auth(){
  var h=_ph();
  if(h){_tok=h;localStorage.setItem("up_token",_tok);history.replaceState(null,"",window.location.pathname+window.location.search);}
  else _tok=localStorage.getItem("up_token");
  if(!_tok){location.href=_loginUrl();return false;}
  return true;
}
function _fmtRange(dep,ret){
  if(!dep)return"";
  var d=new Date(dep+"T00:00:00"),opts={month:"short",day:"numeric"};
  var yr="'"+String(d.getFullYear()).slice(2);
  var s=d.toLocaleDateString("en-US",opts);
  if(ret)s+=" – "+new Date(ret+"T00:00:00").toLocaleDateString("en-US",opts);
  return s+", "+yr;
}

/* ── State rendering ── */
function renderState(state,extra){
  var wrap=document.getElementById("invite-wrap");
  if(!wrap)return;

  if(state==="pending"){
    var inv=_invite;
    var groupLink=inv.trip_group_id?"/trip.html?group_id="+inv.trip_group_id:"";
    var range=_fmtRange(inv.departure_date,inv.return_date);
    var destStr=[inv.destination_name||inv.destination,range].filter(Boolean).join(" · ");
    var html='<div class="invite-card">';
    html+='<div class="eyebrow" style="margin-bottom:12px">Journey invite</div>';
    html+='<div class="invite-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none"><circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.25"/><circle cx="16" cy="8" r="3" stroke="currentColor" stroke-width="1.25"/><path d="M2 20C2 17 4.7 15 8 15" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/><path d="M10 18C10 15.5 12.5 14 16 14C19.5 14 22 15.5 22 18" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/></svg></div>';
    html+='<h1 class="h2" style="margin-bottom:8px">You\'ve been invited</h1>';
    html+='<p class="lede"><strong>'+escHtml(inv.organizer_name||"Someone")+'</strong> has invited you to join their journey.</p>';
    html+='<div class="invite-meta-row">';
    html+='<div class="invite-meta-item"><span class="invite-meta-label">Journey</span><span style="font-weight:500">'+escHtml(inv.group_name||"Journey")+'</span></div>';
    if(destStr)html+='<div class="invite-meta-item"><span class="invite-meta-label">Destination</span><span>'+escHtml(destStr)+'</span></div>';
    html+='<div class="invite-meta-item"><span class="invite-meta-label">Organized by</span><span>'+escHtml(inv.organizer_name||"—")+'</span></div>';
    html+='</div>';
    /* Scope rows — fall back to all three if API returns null/[] */
    var SCOPE_META={
      passport_details:{label:"Passport details",desc:"Validity and nationality — used to check entry requirements for your destination"},
      dietary_preference:{label:"Dietary preference",desc:"Meal category (e.g., vegetarian) — shared for in-flight meal coordination"},
      seat_preference:{label:"Seat preference",desc:"Seat position and cabin class — shared for booking coordination"},
    };
    var scopes=(inv.requested_scopes&&inv.requested_scopes.length)?inv.requested_scopes:Object.keys(SCOPE_META);
    html+='<div class="scope-section">';
    html+='<div class="scope-section-label">What you\'re sharing</div>';
    scopes.forEach(function(s){
      var meta=SCOPE_META[s]||{label:s.replace(/_/g,' ').replace(/\b\w/g,function(c){return c.toUpperCase();}),desc:""};
      html+='<label class="scope-row"><input class="scope-check" type="checkbox" id="scope-'+escHtml(s)+'" value="'+escHtml(s)+'" checked>';
      html+='<div class="scope-info"><div class="scope-name">'+escHtml(meta.label)+'</div>';
      if(meta.desc)html+='<div class="scope-desc">'+escHtml(meta.desc)+'</div>';
      html+='</div></label>';
    });
    html+='</div>';
    html+='<div id="invite-err" class="form-error"></div>';
    html+='<div class="invite-actions">';
    html+='<button class="btn btn-primary" id="accept-btn" onclick="acceptInviteSelected()">Join with selected</button>';
    html+='<button class="btn btn-secondary" id="decline-btn" onclick="declineInvite()">Decline</button>';
    html+='</div>';
    html+='<div style="margin-top:14px;text-align:center"><a href="#" onclick="acceptInviteAll(event)" style="font-size:12px;color:var(--ink-mute);text-decoration:underline;text-underline-offset:2px;text-decoration-thickness:0.5px">Quick join — approve all</a></div>';
    html+='</div>';
    wrap.innerHTML=html;

  }else if(state==="accepted"){
    var groupId=(_invite&&_invite.trip_group_id)||"";
    wrap.innerHTML='<div class="invite-card" style="text-align:center;padding:48px 36px">'
      +'<div class="state-icon" style="color:var(--green)">✓</div>'
      +'<h2 class="h2" style="margin-bottom:12px">You\'re in!</h2>'
      +'<p class="lede" style="margin-bottom:28px">You\'ve joined the journey. Your travel readiness will now be visible to the organizer.</p>'
      +(groupId?'<a href="/trip.html?group_id='+escHtml(groupId)+'" class="btn btn-primary">View journey →</a>':'<a href="/groups.html" class="btn btn-primary">Go to Journeys →</a>')
      +'</div>';

  }else if(state==="declined"){
    wrap.innerHTML='<div class="invite-card" style="text-align:center;padding:48px 36px">'
      +'<div class="state-icon" style="color:var(--ink-mute)">✗</div>'
      +'<h2 class="h2" style="margin-bottom:12px">Invite declined</h2>'
      +'<p class="lede" style="margin-bottom:28px">You\'ve declined this journey invite. The organizer will be notified.</p>'
      +'<a href="/groups.html" class="btn btn-secondary">Go to Journeys</a>'
      +'</div>';

  }else if(state==="already_accepted"){
    var groupId=(_invite&&_invite.trip_group_id)||"";
    wrap.innerHTML='<div class="invite-card" style="text-align:center;padding:48px 36px">'
      +'<div class="state-icon" style="color:var(--green)">✓</div>'
      +'<h2 class="h2" style="margin-bottom:12px">Already joined</h2>'
      +'<p class="lede" style="margin-bottom:28px">You\'ve already accepted this invite and are part of the journey.</p>'
      +(groupId?'<a href="/trip.html?group_id='+escHtml(groupId)+'" class="btn btn-primary">View journey →</a>':'<a href="/groups.html" class="btn btn-primary">Go to Journeys →</a>')
      +'</div>';

  }else if(state==="already_declined"){
    wrap.innerHTML='<div class="invite-card" style="text-align:center;padding:48px 36px">'
      +'<div class="state-icon" style="color:var(--ink-mute)">✗</div>'
      +'<h2 class="h2" style="margin-bottom:12px">Invite previously declined</h2>'
      +'<p class="lede" style="margin-bottom:28px">You already declined this invite. Contact the organizer if you\'d like to join.</p>'
      +'<a href="/groups.html" class="btn btn-secondary">Go to Journeys</a>'
      +'</div>';

  }else if(state==="wrong_account"){
    wrap.innerHTML='<div class="invite-card" style="text-align:center;padding:48px 36px">'
      +'<div style="font-size:40px;margin-bottom:20px">⚠</div>'
      +'<h2 class="h2" style="margin-bottom:12px">Wrong account</h2>'
      +'<p class="lede" style="margin-bottom:12px">'+(extra?escHtml(extra):"This invite was sent to a different email address.")+'</p>'
      +'<p style="font-size:13px;color:var(--ink-mute);margin-bottom:28px">Sign in with the account that received the invite email to continue.</p>'
      +'<button class="btn btn-secondary" onclick="localStorage.removeItem(\'up_token\');window.location.reload()">Sign in with a different account</button>'
      +'</div>';

  }else{
    wrap.innerHTML='<div class="invite-card" style="text-align:center;padding:48px 36px">'
      +'<div style="font-size:40px;margin-bottom:20px" aria-hidden="true">🔍</div>'
      +'<h2 class="h2" style="margin-bottom:12px">Invite not found</h2>'
      +'<p class="lede" style="margin-bottom:28px">'+(extra||"This invite link is invalid or has expired.")+'</p>'
      +'<a href="/groups.html" class="btn btn-secondary">Go to Journeys</a>'
      +'</div>';
  }
}

/* ── Accept / Decline ── */
async function _doAccept(grantedScopes){
  if(!_consentId)return;
  var ab=document.getElementById("accept-btn");
  var db=document.getElementById("decline-btn");
  var er=document.getElementById("invite-err");
  if(ab){ab.disabled=true;ab.textContent="Joining…";}
  if(db)db.disabled=true;
  if(er)er.style.display="none";
  try{
    await _req("POST","/api/v1/trip-groups/invite/"+_consentId+"/accept",{granted_scopes:grantedScopes});
    renderState("accepted");
  }catch(e){
    if(ab){ab.disabled=false;ab.textContent="Join with selected";}
    if(db)db.disabled=false;
    if(er){er.textContent="Failed to accept invite. Please try again.";er.style.display="block";}
  }
}

function acceptInviteSelected(){
  var boxes=document.querySelectorAll(".scope-check:checked");
  var scopes=Array.prototype.map.call(boxes,function(b){return b.value;});
  if(!scopes.length){
    var er=document.getElementById("invite-err");
    if(er){er.textContent="Select at least one item to share, or use Decline to opt out entirely.";er.style.display="block";}
    return;
  }
  _doAccept(scopes);
}

function acceptInviteAll(e){
  if(e)e.preventDefault();
  var boxes=document.querySelectorAll(".scope-check");
  boxes.forEach(function(b){b.checked=true;});
  var allScopes=Array.prototype.map.call(boxes,function(b){return b.value;});
  _doAccept(allScopes);
}

async function declineInvite(){
  if(!_consentId)return;
  if(!confirm("Decline this trip group invite? The organizer will be notified."))return;
  var ab=document.getElementById("accept-btn");
  var db=document.getElementById("decline-btn");
  var er=document.getElementById("invite-err");
  if(ab)ab.disabled=true;
  if(db){db.disabled=true;db.textContent="Declining…";}
  if(er)er.style.display="none";
  try{
    await _req("POST","/api/v1/trip-groups/invite/"+_consentId+"/decline",{});
    renderState("declined");
  }catch(e){
    if(ab)ab.disabled=false;
    if(db){db.disabled=false;db.textContent="Decline";}
    if(er){er.textContent="Failed to decline invite. Please try again.";er.style.display="block";}
  }
}

/* ── Init ── */
async function inviteInit(){
  /* Preserve ?c= across Cognito auth redirect using localStorage */
  var params=new URLSearchParams(window.location.search);
  var urlCid=params.get("c");
  if(urlCid){
    _consentId=urlCid;
    localStorage.setItem("up_invite_cid",urlCid);
  }else{
    _consentId=localStorage.getItem("up_invite_cid")||null;
  }
  if(!_consentId){renderState("error","No invite ID found in this link.");return;}

  if(!await _auth())return;
  /* Clear stored ID once auth succeeded and we have a live session */
  if(!urlCid)localStorage.removeItem("up_invite_cid");

  try{
    var p=await _req("GET","/api/v1/me");
    _uid=p.uuid;
    _sidebarUpdate(p);
  }catch(e){/* sidebar non-critical */}

  try{
    _invite=await _req("GET","/api/v1/trip-groups/invite/"+_consentId);
    document.title=(_invite.group_name||"Journey")+" Invite — UniProfile";
    var status=(_invite.status||"").toLowerCase();
    if(status==="pending"){
      renderState("pending");
    }else if(status==="approved"){
      renderState("already_accepted");
    }else if(status==="declined"){
      renderState("already_declined");
    }else{
      renderState("error","This invite is no longer active.");
    }
  }catch(e){
    if(e.status===403){
      renderState("wrong_account",e.serverMessage||"");
    }else if(e.status===404){
      renderState("error","This invite link is invalid or has expired.");
    }else{
      renderState("error","Failed to load invite. Please try again.");
    }
  }
}
inviteInit();
</script>
