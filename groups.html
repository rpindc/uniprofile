<style>
:root{--ink:#1a1a1a;--ink-soft:#4a4a48;--ink-mute:#8a8a86;--ink-faint:#b8b8b3;--paper:#faf8f4;--paper-warm:#f3efe7;--paper-cream:#f9f7f2;--rule:rgba(26,26,26,0.08);--rule-strong:rgba(26,26,26,0.18);--green:#2d6a4f;--green-soft:#e8efe9;--amber:#ba7517;--amber-soft:#f9f1e3;--red:#c44d4d;--red-soft:#f4e8e8;--serif:'Fraunces',Georgia,serif;--sans:'Inter Tight',-apple-system,sans-serif;--mono:'JetBrains Mono','SF Mono',Menlo,monospace}
*{box-sizing:border-box;margin:0;padding:0}html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);line-height:1.55;font-size:14px;font-weight:400}
.h1{font-family:var(--serif);font-weight:300;font-size:clamp(36px,5vw,52px);line-height:1.1;letter-spacing:-0.02em;color:var(--ink)}
.h1 em{font-style:italic;font-weight:300}
.h3{font-family:var(--serif);font-weight:400;font-size:18px;line-height:1.25;letter-spacing:-0.005em;color:var(--ink)}
.lede{font-family:var(--serif);font-weight:300;font-size:17px;line-height:1.5;letter-spacing:-0.005em;color:var(--ink-soft)}
.eyebrow{font-family:var(--sans);font-size:11px;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-mute)}
.caption{font-size:12px;line-height:1.5;color:var(--ink-mute)}
.id{font-family:var(--mono);font-size:13px;font-weight:500;letter-spacing:0.04em;color:var(--ink)}
.shell{display:flex;min-height:100vh}
.sidebar{width:240px;background:#fff;border-right:0.5px solid var(--rule);padding:28px 0;flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.sidebar-wordmark-block{padding:0 24px 24px;border-bottom:0.5px solid rgba(26,26,26,0.06)}
.wordmark{font-family:var(--serif);font-size:22px;font-weight:400;letter-spacing:-0.01em;line-height:1;color:var(--ink);text-decoration:none;display:block}
.wordmark em{font-style:italic;font-weight:300}
.wordmark-tag{font-family:var(--sans);font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-mute);font-weight:500;margin-top:6px}
.sidebar-id-block{padding:18px 24px;border-bottom:0.5px solid rgba(26,26,26,0.06)}
.sidebar-id-label{font-family:var(--sans);font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-mute);font-weight:500;margin-bottom:6px}
.sidebar-nav{padding:20px 12px;flex:1}
.sidebar-nav-label{font-family:var(--sans);font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-faint);font-weight:500;padding:0 12px 12px}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:6px;text-decoration:none;color:var(--ink-soft);font-size:14px;font-weight:400;margin-bottom:2px;transition:background 120ms ease}
.nav-item:hover{background:rgba(26,26,26,0.03)}
.nav-item.active{background:rgba(26,26,26,0.05);color:var(--ink);font-weight:500}
.nav-item svg{flex-shrink:0}
.sidebar-user-card{padding:12px;border-top:0.5px solid rgba(26,26,26,0.06)}
.user-card-inner{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;cursor:pointer;transition:background 120ms ease}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-style:italic;font-weight:300;color:var(--ink-soft);flex-shrink:0;border:2px solid #fff}
.avatar-sm{width:30px;height:30px;font-size:12px}
.avatar-1{background:linear-gradient(135deg,#d8d3c8,#c4bfb3)}
.main{flex:1;padding:36px 48px;min-width:0;max-width:880px}
.page-header{margin-bottom:32px;display:flex;align-items:flex-start;justify-content:space-between;gap:24px}
.page-header-text .eyebrow{margin-bottom:12px}
.page-header-text .h1{margin-bottom:8px}
.pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:100px;font-family:var(--sans);font-size:11px;font-weight:500;letter-spacing:0.02em}
.pill-green{background:var(--green-soft);color:var(--green)}
.pill-amber{background:var(--amber-soft);color:var(--amber)}
.pill-neutral{background:var(--paper-warm);color:var(--ink-soft)}
.pill-red{background:var(--red-soft);color:var(--red)}
.pill-dot{width:6px;height:6px;border-radius:50%}
.dot-green{background:var(--green)}
.dot-amber{background:var(--amber)}
.btn{font-family:var(--sans);font-size:13px;font-weight:500;padding:10px 18px;border-radius:4px;cursor:pointer;letter-spacing:-0.005em;transition:background 160ms ease,border-color 160ms ease;display:inline-flex;align-items:center;gap:8px;text-decoration:none;border:0.5px solid transparent;background:none}
.btn-primary{color:#fff;background:var(--ink);border-color:var(--ink)}
.btn-primary:hover{opacity:0.88}
.btn-secondary{color:var(--ink);background:transparent;border-color:var(--rule-strong)}
.btn-secondary:hover{background:rgba(26,26,26,0.03)}
.btn-sm{font-size:12px;padding:6px 12px}
.icon{width:16px;height:16px;flex-shrink:0;display:inline-block;vertical-align:middle}
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:24px}
.filter-btn{font-family:var(--sans);font-size:12px;font-weight:500;padding:6px 14px;border-radius:100px;cursor:pointer;border:0.5px solid var(--rule-strong);background:transparent;color:var(--ink-soft);transition:all 120ms ease;white-space:nowrap}
.filter-btn:hover{color:var(--ink);border-color:var(--rule-strong)}
.filter-btn.active{background:var(--ink);color:#fff;border-color:var(--ink)}
/* Group card */
.group-card{background:#fff;border:0.5px solid var(--rule);border-radius:12px;padding:20px 24px;margin-bottom:12px;transition:border-color 120ms ease;display:flex;align-items:flex-start;gap:16px}
.group-card:hover{border-color:var(--rule-strong)}
.group-card.archived{opacity:0.65}
.group-card-date{flex-shrink:0;text-align:center;width:52px;padding:7px 0;border-radius:8px;background:var(--paper-cream)}
.group-card-date-month{font-family:var(--sans);font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-mute);font-weight:500}
.group-card-date-day{font-family:var(--serif);font-size:22px;font-weight:300;color:var(--ink);line-height:1.1}
.group-card-main{flex:1;min-width:0}
.group-card-eyebrow{font-family:var(--mono);font-size:11px;color:var(--ink-mute);letter-spacing:0.06em;margin-bottom:4px}
.group-card-name{font-family:var(--serif);font-size:19px;font-weight:400;letter-spacing:-0.005em;color:var(--ink);margin-bottom:4px}
.group-card-meta{font-size:12px;color:var(--ink-mute);line-height:1.5}
.group-card-action{flex-shrink:0;padding-top:2px}
.toast{position:fixed;bottom:26px;right:26px;background:var(--ink);color:#fff;padding:10px 17px;border-radius:8px;font-size:13px;z-index:2000;opacity:0;transform:translateY(6px);transition:opacity 200ms ease,transform 200ms ease;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
@media(max-width:767px){.main{padding:24px 20px}.group-card{flex-wrap:wrap}.group-card-action{width:100%}}
</style>
</head>

<script>
var _API="https://0wsxmo9ftg.execute-api.us-east-1.amazonaws.com/prod";
var _CD="https://uniprofile-auth.auth.us-east-1.amazoncognito.com";
var _CID="2heljmdli4f9cv2i4m0i020mfc";
var _tok=null,_uid=null;
var _allGroups=[],_curFilter="all";

function _loginUrl(){return _CD+"/login?client_id="+_CID+"&response_type=token&scope=email+openid+profile&redirect_uri="+encodeURIComponent(window.location.origin+window.location.pathname);}
function _ph(){var p=new URLSearchParams(window.location.hash.slice(1));return p.get("id_token")||p.get("access_token");}
async function _req(method,ep,body){
  var o={method:method,headers:{Authorization:"Bearer "+_tok}};
  if(body){o.headers["Content-Type"]="application/json";o.body=JSON.stringify(body);}
  var r=await fetch(_API+ep,o);
  if(r.status===401){localStorage.removeItem("up_token");location.href=_loginUrl();throw new Error("unauth");}
  if(!r.ok)throw new Error("HTTP "+r.status);
  return r.json();
}
function _st(id,v){var e=document.getElementById(id);if(e)e.textContent=v;}
function _ht(id,v){var e=document.getElementById(id);if(e)e.innerHTML=v;}
function escHtml(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function showToast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},3000);}
function _dn(p){if(!p)return"Traveler";if(p.display_name&&p.display_name.trim())return p.display_name.trim();if(p.identity&&p.identity.legal_first)return p.identity.legal_first;return p.uniprofile_number||p.email||"Traveler";}
function _ini(p){var s=_dn(p).trim();return s.length>=2?s.slice(0,2).toUpperCase():s.toUpperCase();}
function _sidebarUpdate(p){
  _st("sidebar-number",p.uniprofile_number||"—");
  _st("sidebar-name",_dn(p));
  _st("sidebar-avatar",_ini(p));
  _st("sidebar-tier",(p.tier||"free").charAt(0).toUpperCase()+(p.tier||"free").slice(1));
}
async function _auth(){
  var h=_ph();
  if(h){_tok=h;localStorage.setItem("up_token",_tok);history.replaceState(null,"",window.location.pathname);}
  else _tok=localStorage.getItem("up_token");
  if(!_tok){location.href=_loginUrl();return false;}
  return true;
}

/* ── Filtering ── */
function applyFilter(filter,btn){
  _curFilter=filter;
  document.querySelectorAll(".filter-btn").forEach(function(b){b.classList.remove("active");});
  if(btn)btn.classList.add("active");
  renderGroups();
}
function _filtered(){
  var today=new Date();today.setHours(0,0,0,0);
  if(_curFilter==="archived")return _allGroups.filter(function(g){return g.archived_at;});
  var active=_allGroups.filter(function(g){return!g.archived_at;});
  if(_curFilter==="upcoming")return active.filter(function(g){return g.departure_date&&new Date(g.departure_date+"T00:00:00")>=today;});
  if(_curFilter==="active"){
    return active.filter(function(g){
      var dep=g.departure_date?new Date(g.departure_date+"T00:00:00"):null;
      var ret=g.return_date?new Date(g.return_date+"T00:00:00"):null;
      return dep&&dep<today&&ret&&ret>=today;
    });
  }
  if(_curFilter==="past"){
    return active.filter(function(g){
      var dep=g.departure_date?new Date(g.departure_date+"T00:00:00"):null;
      var ret=g.return_date?new Date(g.return_date+"T00:00:00"):null;
      if(!dep)return true;
      if(ret)return ret<today;
      return dep<today;
    });
  }
  return _allGroups;
}

/* ── Date helpers ── */
function _fmtRange(dep,ret){
  if(!dep)return"";
  var d=new Date(dep+"T00:00:00"),opts={month:"short",day:"numeric"};
  var yr="'"+String(d.getFullYear()).slice(2);
  var s=d.toLocaleDateString("en-US",opts);
  if(ret)s+=" – "+new Date(ret+"T00:00:00").toLocaleDateString("en-US",opts);
  return s+", "+yr;
}

/* ── Group card ── */
function _groupCard(g){
  var dep=g.departure_date?new Date(g.departure_date+"T00:00:00"):null;
  var month=dep?dep.toLocaleDateString("en-US",{month:"short"}):"—";
  var day=dep?dep.getDate():"?";
  var dest=g.destination||"";
  var destName=g.destination_name||dest;
  var eyebrow=[dest?dest.toUpperCase():"",g.trip_name?escHtml(g.trip_name):""].filter(Boolean).join(" · ");
  var metaParts=[];
  var range=_fmtRange(g.departure_date,g.return_date);
  if(range)metaParts.push(range);
  metaParts.push((g.member_count||0)+" member"+(g.member_count===1?"":"s"));
  var today=new Date();today.setHours(0,0,0,0);
  var depDate=dep;
  var retDate=g.return_date?new Date(g.return_date+"T00:00:00"):null;
  var statusBadge="";
  if(g.archived_at){
    statusBadge='<span class="pill pill-neutral" style="font-size:10px;margin-left:8px">Archived</span>';
  }else if(depDate&&depDate<=today&&retDate&&retDate>=today){
    statusBadge='<span class="pill pill-green" style="font-size:10px;margin-left:8px">Active now</span>';
  }else if(depDate&&depDate>today){
    var diff=Math.round((depDate-today)/86400000);
    if(diff<=14)statusBadge='<span class="pill pill-amber" style="font-size:10px;margin-left:8px">'+diff+'d away</span>';
  }

  var tripLink=g.trip_id?"/trip.html?id="+g.trip_id:"#";
  return'<div class="group-card'+(g.archived_at?" archived":"")+'">'
    +'<div class="group-card-date"><div class="group-card-date-month">'+escHtml(month)+'</div><div class="group-card-date-day">'+day+'</div></div>'
    +'<div class="group-card-main">'
    +(eyebrow?'<div class="group-card-eyebrow">'+eyebrow+'</div>':"")
    +'<div class="group-card-name">'+escHtml(g.name||"Group")+statusBadge+'</div>'
    +'<div class="group-card-meta">'+escHtml(metaParts.join(" · "))+'</div>'
    +'</div>'
    +(g.trip_id?'<div class="group-card-action"><a href="'+escHtml(tripLink)+'" class="btn btn-secondary btn-sm">View trip →</a></div>':"")
    +'</div>';
}

/* ── Render ── */
function renderGroups(){
  var list=_filtered();
  if(!list.length){
    var msgs={
      all:"No trip groups yet. Create one from a trip's detail page.",
      upcoming:"No upcoming trip groups.",
      active:"No groups for trips happening right now.",
      past:"No past trip groups.",
      archived:"No archived groups.",
    };
    _ht("groups-list","<div style='padding:32px 0;color:var(--ink-mute);font-size:13px'>"+(msgs[_curFilter]||"No groups found.")+"</div>");
    return;
  }
  var today=new Date();today.setHours(0,0,0,0);
  var sorted=list.slice().sort(function(a,b){
    if(_curFilter==="past"||_curFilter==="archived"){
      return new Date(b.departure_date||"1970-01-01")-new Date(a.departure_date||"1970-01-01");
    }
    return new Date(a.departure_date||"9999-12-31")-new Date(b.departure_date||"9999-12-31");
  });
  _ht("groups-list",sorted.map(_groupCard).join(""));
}

function updateLede(){
  var total=_allGroups.length;
  var active=_allGroups.filter(function(g){return!g.archived_at;}).length;
  _st("groups-lede",total+" group"+(total===1?"":"s")+(active<total?" — "+active+" active":"")+".");
}

/* ── Init ── */
async function groupsInit(){
  if(!await _auth())return;
  try{
    var p=await _req("GET","/api/v1/me");
    _uid=p.uuid;
    _sidebarUpdate(p);
    _allGroups=await _req("GET","/api/v1/trip-groups");
    updateLede();
    renderGroups();
  }catch(e){
    console.error(e);
    _ht("groups-list","<div style='padding:32px 0;color:var(--red);font-size:13px'>Failed to load groups.</div>");
  }
}
groupsInit();
</script>
</body>
</html>
